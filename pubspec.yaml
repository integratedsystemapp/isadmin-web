name: HGPcWeb
description: "PC WEB for admin"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  json_serializable: ^6.8.0
  flutter_secure_storage: ^9.2.2  # keychain
  device_info_plus: ^11.1.0       # 단말기정보
  get: ^4.6.6
  get_storage: ^2.1.1   # 토큰/인증상태 영속화(웹/모바일 공통)
  flutter_speed_dial: ^7.0.0
  webview_flutter: ^4.10.0
  flutter_markdown: ^0.7.4+1
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  flutter_animate: ^4.5.0
  photo_view: ^0.15.0
  image_picker: ^1.1.2
  scrollview_observer: ^1.23.0      # jump to index
  flutter_slidable: ^3.1.1          # 리스트뷰 아이템 삭제
  google_fonts: 5.1.0              # 구글 폰트
  flex_color_scheme: ^8.0.1         # theme
  animated_text_kit: ^4.2.2
  widget_and_text_animator: ^1.1.5
  http: ^1.2.2
  blinking_text: ^1.0.4
  #  scrollable_positioned_list: ^0.3.8   스크롤 잘됨
  popup_menu_plus: ^0.0.6            # 설정>사진 클릭 시 팝업메뉴 제공
  build_runner: ^2.4.14
  encrypt: ^5.0.3
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  no_screenshot: ^0.3.1
  firebase_analytics: ^11.4.0
  package_info_plus: ^8.1.2       # app version
  flutter_native_splash: ^2.4.6   # loading image
  firebase_crashlytics: ^4.3.0
  json_annotation: ^4.9.0
  flutter_cached_pdfview: ^0.4.3
  shared_preferences: ^2.3.5
  flutter_app_badge_control: ^0.0.2
  internet_connection_checker_plus: ^2.7.0
  #  kokca 개발 중 추가한 패키지
  data_table_2: ^2.6.0
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0
  flutter_tts: ^4.2.2
  #  flutter_app_badger: ^1.5.0
  flutter_card_swiper: ^7.0.2
  card_swiper : ^3.0.0
  sqflite: ^2.4.2

  dio: ^5.4.0
  webview_flutter_web: ^0.2.3+4
  intl: ^0.20.2
  file_picker: ^10.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansKR-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansKR-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansKR-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansKR-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/NotoSansKR-Black.ttf
          weight: 900
        - asset: assets/fonts/NotoSansKR-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansKR-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/NotoSansKR-Thin.ttf
          weight: 100
          # (선택) 영문 가독성용 서브 폰트
#    - family: Inter
#      fonts:
#        - asset: assets/fonts/Inter/Inter-Regular.ttf
#          weight: 400
#        - asset: assets/fonts/Inter/Inter-Bold.ttf
#          weight: 700



  assets:
    - assets/images/dashboard_banner.png
