<!DOCTYPE html>
<html>
<head>

    <title>주소 검색</title>
</head>
<body>
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    new daum.Postcode({
        oncomplete: function(data) {
            window.opener.postMessage(data, "*");
            window.close();
        }
    }).open();
</script>
